{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-water" style="font-size: 3rem; color: #0d6efd;"></i>
                    <h3 class="mt-2">AquaStock</h3>
                    <p class="text-muted">Registra tu tienda de acuarios</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="nombre_tienda" class="form-label">Nombre de tu tienda</label>
                        <input type="text" class="form-control" id="nombre_tienda" name="nombre_tienda" required placeholder="Ej: Acuario Marino">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contrasena</label>
                        <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="Minimo 6 caracteres">
                    </div>
                    <div class="mb-3">
                        <label for="password2" class="form-label">Confirmar contrasena</label>
                        <input type="password" class="form-control" id="password2" name="password2" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-shop"></i> Crear Cuenta</button>
                </form>
                <hr>
                <p class="text-center mb-0">Ya tienes cuenta? <a href="/login">Inicia sesion</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
