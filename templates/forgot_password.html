{% extends "base.html" %}
{% block title %}Olvidé mi contraseña{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-key" style="font-size: 2.2rem; color: #1E3A8A;"></i>
                    <h4 class="mt-2 fw-bold" style="color: #111827;">¿Olvidaste tu contraseña?</h4>
                    <p class="text-muted small">Ingresa tu email y te enviaremos un enlace para restablecerla.</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email de tu cuenta</label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="tu@email.com" autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-envelope me-1"></i> Enviar enlace de recuperación
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0 small">
                    <a href="{{ url_for('login') }}"><i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
