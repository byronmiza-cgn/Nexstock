{% extends "base.html" %}
{% block title %}Nueva Venta{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-plus-circle"></i> Registrar Venta</h2>
<div class="card">
    <div class="card-body">
        {% if frecuentes or resto %}
        <form method="POST">
            {% include '_especies_dropdown.html' %}
            <div class="mb-3">
                <label for="cantidad" class="form-label">Cantidad vendida</label>
                <input type="number" class="form-control" id="cantidad" name="cantidad" min="1" required>
            </div>
            <div class="mb-3">
                <label for="precio_unidad" class="form-label">Precio por unidad ($)</label>
                <input type="number" class="form-control" id="precio_unidad" name="precio_unidad" step="0.01" min="0" required>
            </div>
            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha de venta</label>
                <input type="date" class="form-control" id="fecha" name="fecha" value="{{ hoy }}" required>
            </div>
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Registrar Venta</button>
            <a href="/ventas" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
        {% else %}
        <div class="alert alert-warning">Primero debes <a href="/especies/nueva">registrar al menos una especie</a>.</div>
        {% endif %}
    </div>
</div>
{% endblock %}
