{% extends "base.html" %}
{% block title %}{% if editando %}Editar Especie{% else %}Nueva Especie{% endif %}{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-{% if editando %}pencil{% else %}plus-circle{% endif %}"></i> {% if editando %}Editar Especie{% else %}Registrar Especie{% endif %}</h2>
<div class="card">
    <div class="card-body">
        <form method="POST" action="{% if editando %}{{ url_for('editar_especie', id=editando.id) }}{% endif %}">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre de la especie</label>
                <input type="text" class="form-control" id="nombre" name="nombre" required placeholder="Ej: Betta, Guppy, Coral X" value="{{ editando.nombre if editando else '' }}">
            </div>
            <div class="mb-3">
                <label for="categoria" class="form-label">Categor&iacute;a</label>
                <select class="form-select" id="categoria" name="categoria" required>
                    {% set cat = editando.categoria if editando else 'Pez' %}
                    <option value="Pez" {% if cat == 'Pez' %}selected{% endif %}>Pez</option>
                    <option value="Coral" {% if cat == 'Coral' %}selected{% endif %}>Coral</option>
                    <option value="Invertebrado" {% if cat == 'Invertebrado' %}selected{% endif %}>Invertebrado</option>
                    <option value="Planta" {% if cat == 'Planta' %}selected{% endif %}>Planta</option>
                    <option value="Otro" {% if cat == 'Otro' %}selected{% endif %}>Otro</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="descripcion" class="form-label">Descripci&oacute;n (opcional)</label>
                <textarea class="form-control" id="descripcion" name="descripcion" rows="2" placeholder="Notas sobre la especie">{{ editando.descripcion if editando and editando.descripcion else '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> {% if editando %}Guardar Cambios{% else %}Registrar{% endif %}</button>
            <a href="/especies" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
