{% extends "base.html" %}
{% block title %}Nueva contraseña{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock" style="font-size: 2.2rem; color: #1E3A8A;"></i>
                    <h4 class="mt-2 fw-bold" style="color: #111827;">Nueva contraseña</h4>
                    <p class="text-muted small">Elige una contraseña segura de al menos 6 caracteres.</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="password" class="form-label">Nueva contraseña</label>
                        <input type="password" class="form-control" id="password" name="password"
                               minlength="6" required autofocus placeholder="Mínimo 6 caracteres">
                    </div>
                    <div class="mb-3">
                        <label for="password2" class="form-label">Confirmar contraseña</label>
                        <input type="password" class="form-control" id="password2" name="password2"
                               minlength="6" required placeholder="Repite la contraseña">
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="bi bi-check-lg me-1"></i> Guardar nueva contraseña
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
