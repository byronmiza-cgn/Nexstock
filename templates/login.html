{% extends "base.html" %}
{% block title %}Iniciar Sesion{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-water" style="font-size: 3rem; color: #0d6efd;"></i>
                    <h3 class="mt-2">AquaStock</h3>
                    <p class="text-muted">Inicia sesion en tu tienda</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contrasena</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> Iniciar Sesion</button>
                </form>
                <hr>
                <p class="text-center mb-0">No tienes cuenta? <a href="/registro">Registra tu tienda</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
