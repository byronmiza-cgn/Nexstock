{% extends "base.html" %}
{% block title %}Registrar Muerte{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-plus-circle"></i> Registrar Muerte</h2>
<div class="card">
    <div class="card-body">
        {% if especies %}
        <form method="POST">
            <div class="mb-3">
                <label for="especie_id" class="form-label">Especie</label>
                <select class="form-select" id="especie_id" name="especie_id" required>
                    <option value="">Seleccionar especie...</option>
                    {% for e in especies %}
                    <option value="{{ e.id }}">{{ e.nombre }} ({{ e.categoria }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="cantidad" class="form-label">Cantidad</label>
                <input type="number" class="form-control" id="cantidad" name="cantidad" min="1" required>
            </div>
            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha</label>
                <input type="date" class="form-control" id="fecha" name="fecha" value="{{ hoy }}" required>
            </div>
            <div class="mb-3">
                <label for="nota" class="form-label">Nota (opcional)</label>
                <textarea class="form-control" id="nota" name="nota" rows="2" placeholder="Ej: Problema con el pH del agua"></textarea>
            </div>
            <button type="submit" class="btn btn-danger"><i class="bi bi-check-lg"></i> Registrar Muerte</button>
            <a href="/muertes" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
        {% else %}
        <div class="alert alert-warning">Primero debes <a href="/especies/nueva">registrar al menos una especie</a>.</div>
        {% endif %}
    </div>
</div>
{% endblock %}
